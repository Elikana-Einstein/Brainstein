<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gemini Video Chat</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .video-container { position: relative; width: 640px; border-radius: 16px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 2px solid #334155; }
        video { width: 100%; display: block; transform: scaleX(-1); }
        .controls { margin-top: 20px; display: flex; gap: 15px; align-items: center; }
        button { padding: 12px 24px; border-radius: 999px; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; }
        #recordBtn { background: #3b82f6; color: white; }
        #recordBtn.active { background: #ef4444; animation: pulse 1s infinite; }
        #status { color: #94a3b8; font-size: 0.9rem; }
        #aiResponse { max-width: 600px; margin-top: 20px; text-align: center; line-height: 1.5; color: #cbd5e1; }
        canvas { display: none; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="webcam" autoplay playsinline></video>
    </div>

    <div class="controls">
        <button id="recordBtn">🎤 Start Live Chat</button>
        <div id="status">Microphone Off</div>
    </div>

    <div id="aiResponse">Click the button to start talking. Gemini can see you!</div>
    <canvas id="captureCanvas" width="640" height="480"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('captureCanvas');
        const recordBtn = document.getElementById('recordBtn');
        const status = document.getElementById('status');
        const aiResponse = document.getElementById('aiResponse');
        
        let mediaRecorder;
        let audioChunks = [];
        let isChatting = false;

        // 1. Start Camera Feed
        async function initCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            video.srcObject = stream;
            setupRecorder(stream);
        }

        // 2. Setup Audio Recorder
        function setupRecorder(stream) {
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                const audioBase64 = await blobToBase64(audioBlob);
                const frameBase64 = captureFrame();
                sendToGemini(audioBase64, frameBase64);
            };
        }

        // 3. Capture a single frame from video
        function captureFrame() {
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            return canvas.toDataURL('image/jpeg', 0.5); // Lower quality for speed
        }

        // 4. Toggle Chat
        recordBtn.onmousedown = () => {
            audioChunks = [];
            mediaRecorder.start();
            recordBtn.classList.add('active');
            status.innerText = "Listening...";
        };

        window.onmouseup = () => {
            if(mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                recordBtn.classList.remove('active');
                status.innerText = "Gemini is thinking...";
            }
        };

        async function sendToGemini(audio, image) {
            try {
                const response = await fetch('http://localhost:3000/api/gemini-video-chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ audioBase64: audio, imageBase64: image })
                });
                const data = await response.json();
                aiResponse.innerText = data.reply;
                speak(data.reply);
                status.innerText = "Ready";
            } catch (err) {
                status.innerText = "Error!";
            }
        }

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            window.speechSynthesis.speak(utterance);
        }

        function blobToBase64(blob) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.readAsDataURL(blob);
            });
        }

        initCamera();
    </script>
</body>
</html>
